name: Terraform Plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.tf"
      - "**/*.tfvars"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/*.yml"

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ vars.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Write Terraform backend config
        shell: bash
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_PREFIX: ${{ vars.TF_STATE_PREFIX }}
        run: |
          set -euo pipefail

          if [[ -z "${TF_STATE_BUCKET}" ]]; then
            echo "TF_STATE_BUCKET repository variable is required." >&2
            exit 1
          fi

          if [[ -z "${TF_STATE_PREFIX}" ]]; then
            echo "TF_STATE_PREFIX repository variable is required." >&2
            exit 1
          fi

          cat > backend.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${TF_STATE_BUCKET}"
              prefix = "${TF_STATE_PREFIX}"
            }
          }
          EOF

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -input=false \
            -no-color \
            -var-file=environments/dev.tfvars \
            -out=tfplan

      - name: Generate plain-text plan
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_id }}
          path: ${{ vars.TF_WORKING_DIR }}/tfplan.txt
          retention-days: 7
